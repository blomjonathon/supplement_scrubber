<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCC One Estimate Auditor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="pdfFullParser.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #e8e8e8;
  font-family: 'Segoe UI', Arial, sans-serif;
  font-size: 10pt;
  color: #1a1a2e;
  padding: 24px 16px;
  min-height: 100vh;
}
.page {
  background: #fff;
  width: 920px;
  max-width: 100%;
  margin: 0 auto;
  padding: 48px 64px 64px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.15);
}
.doc-header {
  margin-bottom: 32px;
  border-bottom: 2.5px solid #2563eb;
  padding-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}
.doc-title { font-size: 22pt; font-weight: 700; color: #1a1a2e; }
.doc-sub { font-size: 10pt; color: #6b7280; margin-top: 4px; }

/* Upload */
.upload-area {
  border: 2px dashed #93c5fd;
  border-radius: 10px;
  padding: 52px 24px;
  text-align: center;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  background: #f8faff;
}
.upload-area:hover, .upload-area.drag-over { background: #eff6ff; border-color: #2563eb; }
.upload-icon { font-size: 32pt; margin-bottom: 12px; }
.upload-text { font-size: 13pt; font-weight: 600; color: #1a1a2e; margin-bottom: 6px; }
.upload-sub { font-size: 10pt; color: #6b7280; }
.file-link { color: #2563eb; cursor: pointer; text-decoration: underline; }
.hidden { display: none !important; }
.status { text-align: center; padding: 20px; font-size: 11pt; color: #2563eb; }
.status.error { color: #dc2626; }

/* Spinner */
.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2.5px solid #bfdbfe; border-top-color: #2563eb;
  border-radius: 50%; animation: spin 0.7s linear infinite;
  vertical-align: middle; margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Vehicle card */
/* .vehicle-card {
  background: #f8faff; border: 1px solid #bfdbfe;
  border-radius: 8px; padding: 16px 20px; margin-bottom: 24px;
} */
.card-label {
  font-size: 8pt; font-weight: 700; color: #2563eb;
  text-transform: uppercase; letter-spacing: 0.07em;
  font-family: 'Courier New', monospace; margin-bottom: 10px;
}
.info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px 16px; }
.info-item label { font-size: 8pt; color: #6b7280; display: block; }
.info-item span { font-size: 10pt; font-weight: 600; color: #1a1a2e; }

/* Conditions grid */
.section-title {
  font-size: 12pt; font-weight: 700; color: #1a1a2e;
  margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid #e5e7eb;
}
.cond-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 24px; }
.cond-tag { display: flex; align-items: center; gap: 7px; padding: 7px 10px; border-radius: 6px; font-size: 9pt; font-weight: 600; }
.cond-tag.yes { background: #f0fdf4; color: #15803d; border: 1px solid #86efac; }
.cond-tag.no  { background: #f9fafb; color: #9ca3af; border: 1px solid #e5e7eb; }
.cond-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.yes .cond-dot { background: #16a34a; }
.no  .cond-dot { background: #d1d5db; }

/* Summary bar */
.summary-bar {
  display: flex; align-items: center; justify-content: space-between;
  background: #1a1a2e; color: white; border-radius: 8px;
  padding: 14px 22px; margin-bottom: 20px;
}
.sum-counts { display: flex; gap: 28px; }
.sum-count { text-align: center; }
.sum-num { font-size: 20pt; font-weight: 700; display: block; line-height: 1; }
.sum-lbl { font-size: 8pt; color: #9ca3af; margin-top: 2px; white-space: nowrap; }
.sum-count.c .sum-num { color: #f87171; }
.sum-count.w .sum-num { color: #fbbf24; }
.sum-count.b .sum-num { color: #c4b5fd; }

/* Actions */
.actions { display: flex; gap: 10px; margin-bottom: 28px; flex-wrap: wrap; }
.btn {
  padding: 9px 18px; font-size: 9.5pt; font-weight: 600;
  border-radius: 6px; cursor: pointer; border: none;
  font-family: 'Segoe UI', Arial, sans-serif; transition: background 0.15s;
}
.btn-primary { background: #2563eb; color: white; }
.btn-primary:hover { background: #1d4ed8; }
.btn-secondary { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
.btn-secondary:hover { background: #e5e7eb; }

/* Group header */
.group-header {
  font-size: 9pt; font-weight: 700; color: #2563eb;
  text-transform: uppercase; letter-spacing: 0.06em;
  font-family: 'Courier New', monospace;
  margin: 20px 0 8px;
}
.group-header.critical { color: #dc2626; }
.group-header.warning  { color: #d97706; }
.group-header.blend    { color: #7c3aed; }
.group-header:first-child { margin-top: 0; }

/* Note cards — matches supplement_line_notes style */
.note {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 13px 0; border-bottom: 0.5px solid #e5e7eb;
}
.note:last-child { border-bottom: none; }
.note-body { flex: 1; min-width: 0; }
.note-code {
  font-size: 8pt; font-weight: 700; color: #2563eb;
  font-family: 'Courier New', monospace; margin-bottom: 2px; letter-spacing: 0.03em;
}
.note-code.critical { color: #dc2626; }
.note-code.warning  { color: #d97706; }
.note-code.blend    { color: #7c3aed; }
.note-title { font-size: 10.5pt; font-weight: 700; color: #111827; margin-bottom: 5px; line-height: 1.3; }
.note-text  { font-size: 9.5pt; color: #374151; line-height: 1.6; }

.copy-btn {
  flex-shrink: 0; margin-top: 2px; padding: 5px 13px;
  font-size: 8.5pt; font-weight: 600; color: #2563eb;
  background: #eff6ff; border: 1px solid #bfdbfe;
  border-radius: 5px; cursor: pointer; white-space: nowrap;
  transition: background 0.15s, color 0.15s;
  display: flex; align-items: center; gap: 5px;
  font-family: 'Segoe UI', Arial, sans-serif;
}
.copy-btn:hover { background: #dbeafe; }
.copy-btn.copied { background: #f0fdf4; color: #16a34a; border-color: #86efac; }
.copy-btn svg { width: 12px; height: 12px; flex-shrink: 0; }

/* Miss sections */
.miss-section {
  border-top: 2.5px solid #e5e7eb; padding-top: 20px; margin-bottom: 28px;
}
.miss-section.critical { border-color: #fca5a5; }
.miss-section.warning  { border-color: #fde68a; }
.miss-section.blend    { border-color: #c4b5fd; }

.miss-section-title { font-size: 14pt; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
.miss-section-sub { font-size: 9pt; color: #6b7280; margin-bottom: 16px; font-style: italic; }

/* All clear */
.all-clear {
  text-align: center; padding: 36px;
  background: #f0fdf4; border: 1px solid #86efac; border-radius: 8px;
}
.all-clear-title { font-size: 16pt; font-weight: 700; color: #16a34a; margin-bottom: 6px; }
.all-clear-sub { font-size: 10pt; color: #6b7280; }

.checklist-section { margin-top: 40px; border-top: 2.5px solid #2563eb; padding-top: 20px; }
.checklist-section-title { font-size: 14pt; font-weight: 700; color: #1a1a2e; margin-bottom: 16px; }
.checklist-group { margin-bottom: 20px; }
.checklist-group-title { font-size: 9pt; font-weight: 700; color: #2563eb; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; font-family: 'Courier New', monospace; }
.checklist-items { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 24px; }
.checklist-item { display: flex; align-items: flex-start; gap: 8px; font-size: 9.5pt; color: #374151; line-height: 1.5; padding: 3px 0; cursor: pointer; user-select: none; }
.checklist-item input[type="checkbox"] { appearance: none; -webkit-appearance: none; width: 14px; height: 14px; min-width: 14px; border: 1.5px solid #9ca3af; border-radius: 3px; margin-top: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s, border-color 0.15s; }
.checklist-item input[type="checkbox"]:checked { background: #2563eb; border-color: #2563eb; }
.checklist-item input[type="checkbox"]:checked::after { content: '✓'; color: white; font-size: 9px; font-weight: 700; display: block; text-align: center; line-height: 14px; }
.checklist-item.checked-item span { color: #9ca3af; text-decoration: line-through; }
/* .checklist-item.full-width { grid-column: 1 / -1; } */
.checklist-link-btn {
  padding: 3px 9px; font-size: 8pt; font-weight: 600;
  color: #2563eb; background: #eff6ff; border: 1px solid #bfdbfe;
  border-radius: 4px; text-decoration: none; white-space: nowrap;
  flex-shrink: 0; align-self: center;
}
.checklist-link-btn:hover { background: #dbeafe; }

/* Invoice Review */
.inv-results { margin-top: 32px; border-top: 2.5px solid #e5e7eb; padding-top: 24px; }
.inv-results-title { font-size: 14pt; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
.inv-results-sub { font-size: 9pt; color: #6b7280; margin-bottom: 18px; font-style: italic; }
.inv-counts { display: flex; gap: 28px; margin-bottom: 24px; }
.inv-count { text-align: center; }
.inv-count .inv-num { font-size: 20pt; font-weight: 700; display: block; line-height: 1; }
.inv-count .inv-lbl { font-size: 8pt; color: #9ca3af; margin-top: 2px; white-space: nowrap; }
.inv-count.green .inv-num { color: #16a34a; }
.inv-count.amber .inv-num { color: #d97706; }
.inv-count.red   .inv-num { color: #dc2626; }
.inv-section { border-top: 2.5px solid #e5e7eb; padding-top: 20px; margin-bottom: 28px; }
.inv-section.red-border   { border-color: #fca5a5; }
.inv-section.amber-border { border-color: #fde68a; }
.inv-section.green-border { border-color: #86efac; }
.inv-section-title { font-size: 14pt; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
.inv-section-sub   { font-size: 9pt; color: #6b7280; margin-bottom: 12px; font-style: italic; }
.inv-table { width: 100%; border-collapse: collapse; font-size: 9.5pt; }
.inv-table th { font-size: 8pt; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; padding: 0 8px 6px 0; text-align: left; border-bottom: 1px solid #e5e7eb; }
.inv-table th.r { text-align: right; padding-right: 0; }
.inv-table td { padding: 7px 8px 7px 0; border-bottom: 0.5px solid #f3f4f6; vertical-align: middle; }
.inv-table td.r { text-align: right; font-weight: 700; padding-right: 0; }
.inv-table td.muted { color: #6b7280; font-size: 8.5pt; }
.inv-table td.src  { color: #6b7280; font-size: 8pt; font-style: italic; }
.inv-table tr:last-child td { border-bottom: none; }
details.inv-collapsible > summary { cursor: pointer; list-style: none; }
details.inv-collapsible > summary::-webkit-details-marker { display: none; }
details.inv-collapsible > summary .inv-section-title::before { content: '▶  '; font-size: 9pt; color: #6b7280; }
details.inv-collapsible[open] > summary .inv-section-title::before { content: '▼  '; font-size: 9pt; color: #6b7280; }

@media print {
  body { background: white; padding: 0; }
  .page { box-shadow: none; width: 100%; padding: 0.5in; }
  .upload-area, .actions { display: none !important; }
  .status { display: none; }
  .note { break-inside: avoid; }
  .copy-btn { display: none; }
  .checklist-link-btn { display: none; }
}
</style>
</head>
<body>
<div class="page">
  <div class="doc-header">
    <div>
      <div class="doc-title">Estimate Auditor</div>
      <div class="doc-sub">CCC One — Missing Operations Checker</div>
    </div>
    <div style="font-size:9pt;color:#9ca3af;text-align:right;">New Central Auto</div>
  </div>


  <div id="uploadSection">
    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📋</div>
      <div class="upload-text">Drop a CCC One estimate PDF here</div>
      <div class="upload-sub">or <label class="file-link" for="fileInput">click to browse</label></div>
      <input type="file" id="fileInput" accept=".pdf" style="display:none">
    </div>
  </div>

  <div id="statusDiv" class="status hidden"></div>
  <div id="resultsSection" class="hidden"></div>

  <div class="checklist-section">
    <div class="checklist-section-title">Supplement Checklist</div>

    <div class="checklist-group">
      <div class="checklist-group-title">Required Research</div>
      <div class="checklist-items">
        <label class="checklist-item"><input type="checkbox"><span>OEM Repair Procedures (Alldata)</span></label>
        <div class="checklist-item full-width" style="justify-content:space-between;align-items:center;">
          <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;user-select:none;">
            <input type="checkbox"><span>Necessary Calibrations (REV ADAS)</span>
          </label>
          <div style="display:flex;gap:6px;flex-shrink:0;">
            <a href="https://cloud-us.autel.com/fileManagement/reportManagement" target="_blank" class="checklist-link-btn" onclick="event.stopPropagation()">Autel Reports</a>
            <a href="https://app.revvadas.com/reports/new" target="_blank" class="checklist-link-btn" onclick="event.stopPropagation()">REV ADAS</a>
          </div>
        </div>
      </div>
    </div>

    <div class="checklist-group">
      <div class="checklist-group-title">Things to Check / Confirm</div>
      <div class="checklist-items">
        <label class="checklist-item"><input type="checkbox"><span>Rates / Sales Tax</span></label>
        <label class="checklist-item"><input type="checkbox"><span>Apply Rates Retroactively</span></label>
        <label class="checklist-item"><input type="checkbox"><span>Refinish Adjustments</span></label>
        <label class="checklist-item"><input type="checkbox"><span>Hood or Trunk Hinges Damaged?</span></label>
        <label class="checklist-item"><input type="checkbox"><span>Missing Parts (Compare to Opposing Side)</span></label>
        <label class="checklist-item"><input type="checkbox"><span>V.I.N. &amp; Hood Labels</span></label>
        <label class="checklist-item"><input type="checkbox"><span>Non-reusable glass</span></label>
        <label class="checklist-item"><input type="checkbox"><span>Alternate / Non-OEM Part Availability (Obtain No Quotes)</span></label>
        <label class="checklist-item"><input type="checkbox"><span>Confirm Material Costs</span></label>
        <label class="checklist-item"><input type="checkbox"><span>R&amp;I Front Radar</span></label>
        <label class="checklist-item"><input type="checkbox"><span>R&amp;I Rear Bumper Park Sensors</span></label>
        <label class="checklist-item"><input type="checkbox"><span>R&amp;I Air Bag Sensors in Replacement Doors</span></label>
        <label class="checklist-item"><input type="checkbox"><span>R&amp;I/Drop Body Weatherstrips for Headliner Removal</span></label>
      </div>
    </div>

    <div class="checklist-group">
      <div class="checklist-group-title">Additional Line Items</div>
      <div class="checklist-items">
        <label class="checklist-item"><input type="checkbox"><span>a91.9 &ndash; 3 Stage</span></label>
        <label class="checklist-item"><input type="checkbox"><span>a92 &ndash; Tow Bill</span></label>
        <label class="checklist-item full-width"><input type="checkbox"><span>a2&ndash;a4.01 &ndash; Standard Procedures (Flex Additive, Corrosion Protection, Car Cover, Hazardous Waste, Clean &amp; Re-tape)</span></label>
        <label class="checklist-item full-width"><input type="checkbox"><span>a92.0&ndash;a92.1 &ndash; Wheel Damage, Wheel Alignment, Mount and Balance</span></label>
        <label class="checklist-item"><input type="checkbox"><span>a92.2&ndash;a92.5 &ndash; Fluids (Washer Fluid, OEM Coolant, Etc.)</span></label>
        <label class="checklist-item"><input type="checkbox"><span>a92.9 &amp; a93 &ndash; Auto Up/Down Window Initialization</span></label>
        <label class="checklist-item"><input type="checkbox"><span>a93.1 &ndash; Test Fit/Align Recycled &amp; Non-OEM Parts</span></label>
        <label class="checklist-item"><input type="checkbox"><span>a93.2 &ndash; Pull for Access</span></label>
        <label class="checklist-item"><input type="checkbox"><span>a93.3 &ndash; Transfer Wiring</span></label>
      </div>
    </div>

    <div class="checklist-group">
      <div class="checklist-group-title">Review</div>
      <div class="checklist-items">
        <div class="checklist-item full-width" style="align-items:center;grid-column:1/-1;">
          <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;user-select:none;">
            <input type="checkbox"><span>Review Part Invoices (Confirm all Parts are Accounted for)</span>
          </label>
          <button class="checklist-link-btn" style="cursor:pointer;display:none;" onclick="triggerInvoiceReview(); event.stopPropagation()">Upload Invoices</button>
        </div>
        <input type="file" id="invoiceInput" multiple accept=".pdf" style="display:none">
        <label class="checklist-item"><input type="checkbox"><span>Review Technician Repair Photos</span></label>
        <label class="checklist-item"><input type="checkbox"><span>Review Refinish Exclusions</span></label>
        <label class="checklist-item"><input type="checkbox"><span>Review Body Exclusions</span></label>
        <label class="checklist-item"><input type="checkbox"><span>Review Applicable P-Pages</span></label>
        <label class="checklist-item"><input type="checkbox"><span>Remove Material Cap (a92.8)</span></label>
      </div>
    </div>

    <div class="checklist-group">
      <div class="checklist-group-title">Excluded Common Body Operations</div>
      <div class="checklist-items">
        <label class="checklist-item"><input type="checkbox"><span>Sail Rail Refinish / Blend</span></label>
        <label class="checklist-item"><input type="checkbox"><span>Rocker Panel Refinish / Blend</span></label>
        <label class="checklist-item"><input type="checkbox"><span>Tow Hook Cover Refinish / Blend</span></label>
        <label class="checklist-item"><input type="checkbox"><span>Prep Raw Plastic</span></label>
        <label class="checklist-item"><input type="checkbox"><span>Chip Guard / Rock Guard</span></label>
      </div>
    </div>

    <div class="checklist-group">
      <div class="checklist-group-title">Documents to Create</div>
      <div class="checklist-items">
        <label class="checklist-item"><input type="checkbox"><span>a93.4 &ndash; Not Included Consumables / Dry Goods Invoice</span></label>
        <div class="checklist-item full-width" style="align-items:center">
          <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;user-select:none;">
            <input type="checkbox"><span>a93.5 &ndash; De/Nib &amp; Polish</span>
          </label>
          <button id="denibCalcBtn" onclick="triggerDenibCalc()" class="checklist-link-btn" style="cursor:pointer;font-family:inherit;">Calculate De/Nib &amp; Polish</button>
        </div>
        <label class="checklist-item"><input type="checkbox"><span>Clear Bra Invoice</span></label>
        <label class="checklist-item"><input type="checkbox"><span>Scan Invoice (REV ADAS) &ndash; Add Test Drive</span></label>
        <label class="checklist-item"><input type="checkbox"><span>a92.6 &ndash; Glass Sublet Invoice</span></label>
        <label class="checklist-item"><input type="checkbox"><span>a92.7 &ndash; Glass Kit</span></label>
        <label class="checklist-item"><input type="checkbox"><span>R1234YF A/C Evacuate &amp; Recharge Invoice</span></label>
      </div>
    </div>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── Note library ─────────────────────────────────────────────────────────────
// Each key matches an item name returned by the rules engine.

const NOTES = {
  // ── Conditional ───────────────────────────────────────────────────────────
  'Mask Jambs': {
    code: 'a9.4', sev: 'critical',
    title: 'Mask Jambs',
    text: "This operation covers the specialized labor and materials required to seal the interior door openings, pillar jambs, and passenger cabin before painting. Because factory tolerances require painting the exterior panels while doors or lids are closed or slightly ajar, specialized foam tracking and masking tapes must be applied inside the gaps. This creates an airtight seal that prevents airborne paint overspray from drifting into the vehicle's interior, onto leather upholstery, or onto clean factory-finished inner door frames."
  },
  'R&I Air Bag Sensors in Door': {
    code: 'a9.4a', sev: 'critical',
    title: 'R&I Air Bag Sensors in Door',
    text: "This operation covers the removal and reinstallation of the side-impact air bag sensor module mounted inside the door assembly. When a door is replaced, the factory-installed sensor must be carefully unplugged and transferred to the replacement door. Failure to properly transfer and reconnect the sensor leaves the occupant protection system incomplete and may trigger diagnostic fault codes that prevent the vehicle from passing safety inspection."
  },
  'Feather, Prime & Block': {
    code: 'a90.4', sev: 'critical',
    title: 'Feather, Prime & Block',
    text: "This operation covers the highly meticulous multi-stage process required to restore a repaired panel to a perfectly flat, factory-smooth surface before final paint is applied. When a panel is repaired, a micro-step exists between the repaired zone and the original paint. This process expands (feathers) that edge, applies a specialized high-build primer to fill the micro-grooves, and manually sands the area using a sanding block to verify the structural contour is flawless. Without this operation, the new paint will sink, revealing unsightly sand scratches and surface distortions."
  },
  'Mask for Primer': {
    code: 'a90.5', sev: 'critical',
    title: 'Mask for Primer',
    text: "This operation covers the initial, separate labor and materials required to protect the vehicle before the liquid primer coating is applied. High-build filler primer is a heavy, fast-drying chemical that creates a massive amount of airborne overspray and fine dust during application. This step completely seals off the rest of the vehicle, engine bay, and adjacent glass to ensure this sticky primer residue does not contaminate clean factory panels, avoiding surface damage before the final paint process begins."
  },
  'Color Tint / Color Match': {
    code: 'a9.8', sev: 'critical',
    title: 'Color Tint / Color Match',
    text: "This operation covers the highly precise chemical adjustment and manual blending of paint toners required to match the vehicle's current, real-world finish. While factory paint codes provide a starting formula, a vehicle's actual color shifts due to assembly plant variations, age, and sun exposure. The painter must manually mix and alter the formula to achieve an exact visual match before application, preventing a mismatched patch effect."
  },
  'Let Down Panel': {

const COPY_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
const CHECK_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

// Copy text for a single note button
let _noteTexts = {};
let _noteItemNames = {};
let _ppageFolder = null;
let _roOutputFolder = null;

async function copyNote(id) {
  const text = _noteTexts[id];
  if (!text) return;
  const btn = document.getElementById('cpbtn-' + id);
  await navigator.clipboard.writeText(text);
  const itemName = _noteItemNames[id];
  const saved = (itemName && _roOutputFolder) ? await savePageForItem(itemName) : false;
  if (btn) {
    btn.innerHTML = CHECK_ICON + (saved ? ' Copied + Saved!' : ' Copied!');
    btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = COPY_ICON + ' Copy'; btn.classList.remove('copied'); }, 2000);
  }
}

// Render a single note card
let _noteCounter = 0;
function noteCard(itemName, overrideText) {
  const note = NOTES[itemName];
  if (!note) return '';
  const id = _noteCounter++;
  const displayText = overrideText || note.text;
  _noteTexts[id] = displayText;
  _noteItemNames[id] = itemName;
  return `<div class="note">
    <div class="note-body">
      <div class="note-code ${note.sev}">${esc(note.code)}</div>
      <div class="note-title">${esc(note.title)}</div>
      <div class="note-text">${esc(displayText)}</div>
    </div>
    <button class="copy-btn" id="cpbtn-${id}" onclick="copyNote(${id})">${COPY_ICON} Copy</button>
  </div>`;
}

// ── PDF text extraction ───────────────────────────────────────────────────────

async function extractText(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const pages = [];
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    pages.push(content.items.map(x => x.str).join(' '));
  }
  return pages.join('\n');
}

// ── Helpers ─────────────────────────────────────────────────────────────────

function has(text, keywords) {
  const t = text.toLowerCase();
  return keywords.some(k => typeof k === 'string' ? t.includes(k.toLowerCase()) : k.test(text));
}

function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Vehicle info ─────────────────────────────────────────────────────────────

function vehicleInfo(text) {
  const m = (re, g=1) => (text.match(re)||[])[g] || '';
  return {
    vin:     m(/VIN[:\s]+([A-HJ-NPR-Z0-9]{17})/i),
    ro:      m(/RO\s*Number[:\s]+(\d+)/i),
    claim:   m(/Claim\s*#[:\s]+([A-Z0-9-]+)/i),
    insured: m(/Insured[:\s]+([^\n,]+)/i),
    policy:  m(/Policy\s*#[:\s]+([A-Z0-9]+)/i),
    date:    m(/Date\s+of\s+Loss[:\s]+([^\n]+)/i),
  };
}

// ── Condition detection ──────────────────────────────────────────────────────

function detect(text, lines = []) {
  const doorRepl =
    /\b(?:Repl|R&R|Remove\/Replace)\b[^\n]{0,35}\b(?:RT|LT)\s+(?:Front\s+|Rear\s+)?Door\b(?!\s+(?:seal|handle|glass|mirror|trim|molding|belt|lower|water|corner|cover|step|sill))/i.test(text)
    || /\b(?:Repl|Remove\/Replace)\b[^\n]{0,35}\b(?:door\s+outer|outer\s+door|door\s+shell|door\s+skin|door\s+asm)/i.test(text);

  // paintTime: row-level check first (most reliable), then two text-scan patterns.
  // "Paint Labor X hrs" appears in older estimate formats; "Labor, Refinish" appears
  // in Final Bill / newer summary formats.
  const paintTime =
    (lines.length > 0 && lines.some(l => l.paintHrs > 0))
    || /Paint\s+Labor\s+(?:[1-9]\d*\.?\d*|\d+\.[1-9]\d*)\s+hrs/i.test(text)
    || /Labor[,\s]+Refinish\b[^\n]*[1-9]/i.test(text);

  // blend: printed format uses "Blend", internal uses "Blnd"
  const blend = /\bBlnd\b/i.test(text) || lines.some(l => /^blend$/i.test(l.op));

  const weldedPanel = /\bRepl\b[^\n]{0,35}\b(?:quarter\s+panel|rear\s+body|floor\s+pan|floor\s+board|rocker\s+panel|center\s+pillar|b-pillar|a-pillar|c-pillar)/i.test(text)
    || /remove\/replace[^\n]{0,35}\b(?:quarter\s+panel|rear\s+body|floor\s+pan|rocker\s+panel|center\s+pillar|b-pillar|a-pillar|c-pillar)/i.test(text);
  const emblem  = /\bRepl\b[^\n]{0,25}\b(?:emblem|nameplate|badge|decal)\b/i.test(text)
    || /remove\/replace[^\n]{0,25}\b(?:emblem|nameplate|badge|decal)\b/i.test(text);
  const glass   = /\b(?:R&I|Repl|R&R|Remove\/Replace|Remove\/Install)\b[^\n]{0,30}\b(?:windshield|door\s+glass|quarter\s+glass|back\s+glass|rear\s+glass)\b/i.test(text);
  const sublet  = /\bSubl\b/i.test(text) || /\bSublet\b/i.test(text);
  const frameTime = /Frame\s+Labor\s+[1-9]/i.test(text) || /\bStraighten\b[^\n]{0,20}\bframe\b/i.test(text);
  const frontDamage =
    /\bfront\s+bumper\b/i.test(text) || /\bheadlamp\b/i.test(text)
    || /\bgrille\b/i.test(text) || /\bradiator\s+support\b/i.test(text)
    || /Point\s+of\s+Impact[^\n]{0,10}(?:12|Front)/i.test(text);
  const lkq = /\bLKQ\b/.test(text) || /\bRCY\b/.test(text) || /\bUSED\b/.test(text);

  // Row-level: "Repair" (printed) or "Rpr" (internal) in op column AND paint hrs > 0
  // in the exact same row. Falls back to text-scan if the parser returned nothing.
  const repairOnPanel = lines.length > 0
    ? lines.some(l => /^(?:repair|rpr)$/i.test(l.op) && l.paintHrs > 0)
    : /\bRpr\b/.test(text) && paintTime;

  return { doorRepl, paintTime, blend, weldedPanel, emblem, glass, sublet, frameTime, frontDamage, lkq, repairOnPanel };
}

// ── Rules engine ─────────────────────────────────────────────────────────────

function conditionalMissing(text, cond) {
  const missing = [];
  const p = kws => has(text, kws);

  if (cond.doorRepl) {
    if (!p(['mask jamb']))
      missing.push({ trigger: 'Door Replacement', item: 'Mask Jambs' });
    if (!p(['air bag sensor', 'airbag sensor', 'r&i side impact', 'side impact sensor']))
      missing.push({ trigger: 'Door Replacement', item: 'R&I Air Bag Sensors in Door' });
  }

  if (cond.repairOnPanel) {
    if (!p(['feather', 'f,p&b', 'f/p/b', 'prime & block', 'prime and block']))
      missing.push({ trigger: 'Repair on Painted Panel', item: 'Feather, Prime & Block' });
    if (!p(['mask for primer', 'mask primer', 'mask/prime', 'mask & prime']))
      missing.push({ trigger: 'Repair on Painted Panel', item: 'Mask for Primer' });
  }

  if (cond.paintTime) {
    if (!p(['color tint', 'color match', 'tint/color']))
      missing.push({ trigger: 'Paint Time Present', item: 'Color Tint / Color Match' });
    if (!p(['let down panel', 'letdown panel']))
      missing.push({ trigger: 'Paint Time Present', item: 'Let Down Panel' });
    if (!p(['de-nib', 'denib', 'de nib', 'nib & buff', 'nib and buff', 'nib/buff']))
      missing.push({ trigger: 'Paint Time Present', item: 'De-Nib and Polish' });
  }

  if (cond.weldedPanel) {
    if (!p(['repair weld zone', 'weld zone', 'weld repair']))
      missing.push({ trigger: 'Welded Panel Replacement', item: 'Repair Weld Zones After Panel Replacement' });
    if (!p(['set back wiring', 'setback wiring', 'set-back wiring']))
      missing.push({ trigger: 'Welded Panel Replacement', item: 'Set Back Wiring' });
    if (!p(['welder set up', 'welder setup', 'welder set-up']))
      missing.push({ trigger: 'Welded Panel Replacement', item: 'Welder Set Up' });
    if (!p(['seam sealer', 'factory seam', 'remove seam']))
      missing.push({ trigger: 'Welded Panel Replacement', item: 'Remove Factory Seam Sealer from Adjacent Panels' });
  }

  if (cond.emblem) {
    if (!p(['remove adhesive', 'adhesive removal', 'adhesives']))
      missing.push({ trigger: 'Emblem / Badge / Decal Replacement', item: 'Remove Adhesives' });
  }

  if (cond.glass) {
    if (!p(['urethane removal', 'old urethane']))
      missing.push({ trigger: 'Glass R&I / Replacement', item: 'Old Urethane Removal' });
    if (!p(['glass kit', 'windshield kit']))
      missing.push({ trigger: 'Glass R&I / Replacement', item: 'Glass Kit' });
  }

  if (cond.sublet) {
    if (!p(['sublet stall', 'stall time']))
      missing.push({ trigger: 'Sublet Operation Present', item: 'Sublet Stall Time' });
  }

  if (cond.frameTime) {
    if (!p(['clamp damage', 'pinchweld repair', 'pinch weld repair', 'pinchweld']))
      missing.push({ trigger: 'Frame Time Present', item: 'Clamp Damage / Pinchweld Repair' });
    if (!p(['refinish pinch', 'refinish pinchweld']))
      missing.push({ trigger: 'Frame Time Present', item: 'Refinish Pinch Welds' });
  }

  if (cond.frontDamage) {
    if (!p(['tram radiator', 'tram rad', 'tram r/s', 'measure radiator']))
      missing.push({ trigger: 'Front Damage Detected', item: 'Tram Radiator Support' });
  }

  if (cond.lkq) {
    if (!p(['clean', 'inspect', 'de-trim', 'lkq prep']))
      missing.push({ trigger: 'LKQ / Recycled Parts Detected', item: 'Clean / Inspect / De-Trim Recycled Parts' });
  }

  return missing;
}

// Returns the set of P_PAGE_RULES item names that ARE present on the estimate.
// Conditional items are only included when their triggering condition was detected.
// Always-check items are included whenever their keyword is found.
function getPresentPPageItems(text, cond) {
  const present = new Set();
  const p = kws => has(text, kws);

  if (cond.doorRepl) {
    if (p(['mask jamb'])) present.add('Mask Jambs');
    if (p(['air bag sensor', 'airbag sensor', 'r&i side impact', 'side impact sensor'])) present.add('R&I Air Bag Sensors in Door');
  }
  if (cond.repairOnPanel) {
    if (p(['feather', 'f,p&b', 'f/p/b', 'prime & block', 'prime and block'])) present.add('Feather, Prime & Block');
    if (p(['mask for primer', 'mask primer', 'mask/prime', 'mask & prime'])) present.add('Mask for Primer');
  }
  if (cond.paintTime) {
    if (p(['color tint', 'color match', 'tint/color']))                                  present.add('Color Tint / Color Match');
    if (p(['let down panel', 'letdown panel']))                                           present.add('Let Down Panel');
    if (p(['de-nib', 'denib', 'de nib', 'nib & buff', 'nib and buff', 'nib/buff']))     present.add('De-Nib and Polish');
  }
  if (cond.weldedPanel) {
    if (p(['repair weld zone', 'weld zone', 'weld repair']))                             present.add('Repair Weld Zones After Panel Replacement');
    if (p(['set back wiring', 'setback wiring', 'set-back wiring']))                     present.add('Set Back Wiring');
    if (p(['welder set up', 'welder setup', 'welder set-up']))                           present.add('Welder Set Up');
    if (p(['seam sealer', 'factory seam', 'remove seam']))                               present.add('Remove Factory Seam Sealer from Adjacent Panels');
  }
  if (cond.emblem) {
    if (p(['remove adhesive', 'adhesive removal', 'adhesives']))                         present.add('Remove Adhesives');
  }
  if (cond.glass) {
    if (p(['urethane removal', 'old urethane']))                                          present.add('Old Urethane Removal');
    if (p(['glass kit', 'windshield kit']))                                               present.add('Glass Kit');
  }
  if (cond.sublet) {
    if (p(['sublet stall', 'stall time']))                                                present.add('Trip Charge / Sublet Stall Time');
  }
  if (cond.frameTime) {
    if (p(['clamp damage', 'pinchweld repair', 'pinch weld repair', 'pinchweld']))       present.add('Clamp Damage / Pinchweld Repair');
    if (p(['tram radiator', 'tram rad', 'tram r/s', 'measure radiator']))                present.add('Tram Radiator Support');
  }
  if (cond.frontDamage) {
    if (p(['tram radiator', 'tram rad', 'tram r/s', 'measure radiator']))                present.add('Tram Radiator Support');
  }
  if (cond.lkq) {
    if (p(['clean', 'inspect', 'de-trim', 'lkq prep']))                                  present.add('Clean / Inspect / De-Trim Recycled Parts');
  }

  // Always-check items that have P-page rules — present if keyword found
  const alwChecks = [
    { item: 'Disconnect/Reconnect Battery',              kws: ['disconnect/reconnect battery', 'disconnect battery', 'reconnect battery', 'battery cable'] },
    { item: 'OEM Procedure Research Admin Time',         kws: ['oem procedure', 'procedure research', 'oem research', 'alldata'] },
    { item: 'Set-Up & Measure',                          kws: ['set-up & measure', 'setup & measure', 'set up & measure', 'setup and measure'] },
    { item: 'Trip Charge / Sublet Stall Time',           kws: ['trip charge', 'sublet stall', 'stall time'] },
    { item: 'Rope Glass / Additional Not Included Masking', kws: ['rope glass', 'rope molding', 'rope mask'] },
    { item: 'Second Color Set-Up',                       kws: ['second color', '2nd color'] },
    { item: 'Clean for Delivery',                        kws: ['clean for delivery', 'cleaning for delivery'] },
    { item: 'Flash Time',                                kws: ['flash time'] },
  ];
  for (const { item, kws } of alwChecks) {
    if (p(kws)) present.add(item);
  }

  return present;
}

// Panels we buff/denib: fenders, doors, hoods, quarter panels, aperture panels,
// cabs, tailgates, box side outer panels, and side panels. Nothing structural.
function _isBuffablePanel(text) {
  if (!text) return false;
  const t = text.toLowerCase();
  if (/radiator[\s\-]*support|rad[\s\-]*support/.test(t)) return false;
  return (
    /\bfender\b/.test(t)                          ||
    (/\bdoor\b/.test(t) && !/\bglass\b/.test(t))  ||
    /\bhood\b/.test(t)                             ||
    /quarter[\s\-]*panel/.test(t)                  ||
    /\bapertur/.test(t)                            ||
    /\bcab\b/.test(t)                              ||
    /tail[\s\-]*gate/.test(t)                      ||
    /box[\s\-]*side/.test(t)                       ||
    /outer[\s\-]*panel/.test(t)                    ||
    /\bside[\s\-]*panel\b/.test(t)
  );
}

// ── Blend hours ───────────────────────────────────────────────────────────────

function blendHourIssues(text) {
  const issues = [];
  for (const line of text.split(/\n/)) {
    if (!/\bblnd\b/i.test(line)) continue;
    const panel = blendName(line);
    if (!_isBuffablePanel(panel)) continue;
    const nums = (line.match(/\d+(?:\.\d+)?/g)||[]).map(Number).filter(n => n > 0 && n < 25);
    if (!nums.length) {
      issues.push({ panel, note: 'Paint hours could not be parsed — verify manually (min 1.5 hrs)' });
    } else {
      const hrs = nums[nums.length - 1];
      if (hrs < 1.5) issues.push({ panel, note: `${hrs} hrs — minimum 1.5 hrs required` });
    }
  }
  return issues;
}

function blendName(line) {
  const m = line.match(/\bblnd\b\s+((?:rt\s+|lt\s+)?[^\d\n]{2,40})/i);
  return m ? m[1].trim().replace(/\s+/g, ' ') : 'Unknown Panel';
}

// ── Copy all missing (plain text summary) ────────────────────────────────────

function copyAllMissing() {
  const d = window._copyAll;
  if (!d) return;
  const lines = ['MISSING / REVIEW OPERATIONS', '='.repeat(44), ''];
  if (d.condMiss.length) {
    lines.push('CONDITIONALLY MISSING:');
    for (const [trigger, items] of Object.entries(d.groups)) {
      lines.push(`  [${trigger}]`);
      items.forEach(i => lines.push(`    • ${i}`));
    }
    lines.push('');
  }
  if (d.blMiss.length) {
    lines.push('BLEND HOUR ISSUES:');
    d.blMiss.forEach(({panel, note}) => lines.push(`  • ${panel} — ${note}`));
    lines.push('');
  }
  if (d.alwMiss.length) {
    lines.push('ALWAYS-CHECK NOT FOUND:');
    d.alwMiss.forEach(i => lines.push(`  • ${i}`));
  }
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    const btn = document.querySelector('.btn-primary');
    if (btn) { btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy All Missing', 2000); }
  });
}

// Build a Set of all item names that have missing issues (both conditional + always-check)
function getAllMissingItemNames() {
  const d = window._copyAll;

// ── P-Page folder helpers ─────────────────────────────────────────────────────

async function setPPageFolder() {
  if (!window.showDirectoryPicker) {
    alert('Your browser does not support folder access. Please use Chrome or Edge and try again.');
    return;
  }

  const folderBtn = document.querySelector('[onclick="setPPageFolder()"]');
  const statusEl  = document.getElementById('ppageStatus');

  let sourceDir;
  try {
    sourceDir = await window.showDirectoryPicker({ mode: 'readwrite' });
  } catch (e) {
    if (e.name !== 'AbortError') alert('Could not open folder: ' + e.message);
    return;
  }

  _ppageFolder    = sourceDir;
  _roOutputFolder = null;
  updatePPageFolderLabel();

  if (statusEl) { statusEl.style.display = 'block'; statusEl.style.color = '#374151'; statusEl.textContent = 'Creating RO folder…'; }
  if (folderBtn) folderBtn.disabled = true;

  const ro = (window._roNumber || 'RO').replace(/[\\/:*?"<>|]/g, '-').trim();

  try {
    _roOutputFolder = await _ppageFolder.getDirectoryHandle(ro, { create: true });
  } catch (e) {
    if (statusEl) { statusEl.style.color = '#dc2626'; statusEl.textContent = `Could not create folder "${ro}": ${e.message}`; }
    if (folderBtn) folderBtn.disabled = false;
    return;
  }

  let sourceFiles;
  try {
    sourceFiles = await getPDFsFromFolder(_ppageFolder);
  } catch (e) {
    if (statusEl) { statusEl.style.color = '#dc2626'; statusEl.textContent = `Error reading source folder: ${e.message}`; }
    if (folderBtn) folderBtn.disabled = false;
    return;
  }

  const onEstimate = window._ppageOnEstimate || new Set();
  const copied = [];

  for (const file of sourceFiles) {
    const rule = P_PAGE_RULES.find(r => onEstimate.has(r.item) && r.test(file.name));
    if (rule) {
      try {
        const fh = await _roOutputFolder.getFileHandle(file.name, { create: true });
        const writable = await fh.createWritable();
        await writable.write(await file.arrayBuffer());
        await writable.close();
        copied.push(file.name);
      } catch (e) { /* skip */ }
    }
  }

  if (folderBtn) folderBtn.disabled = false;

  if (statusEl) {
    if (copied.length) {
      statusEl.style.color = '#16a34a';
      statusEl.textContent = `Folder "${ro}" ready with ${copied.length} P-page${copied.length !== 1 ? 's' : ''}: ${copied.join(', ')}. Use Copy on any note to add more.`;
    } else {
      statusEl.style.color = '#d97706';
      statusEl.textContent = `Folder "${ro}" created — no matching P-pages found in source folder yet. Use Copy buttons to add them.`;
    }
  }
}

function updatePPageFolderLabel() {
  const el = document.getElementById('ppageFolderLabel');
  if (!el) return;
  if (_ppageFolder) {
    el.textContent = '📁 ' + _ppageFolder.name;
    el.style.color = '#16a34a';
  } else {
    el.textContent = 'No folder set';
    el.style.color = '#6b7280';
  }
}

async function getPDFsFromFolder(dirHandle) {
  const files = [];
  for await (const [name, handle] of dirHandle.entries()) {
    if (handle.kind === 'file' && name.toLowerCase().endsWith('.pdf')) {
      files.push(await handle.getFile());
    }
  }
  return files;
}

// Write a single file handle's contents into _roOutputFolder. Returns true on success.
async function savePageForItem(itemName) {
  if (!_ppageFolder || !_roOutputFolder) return false;
  const rule = P_PAGE_RULES.find(r => r.item === itemName);
  if (!rule) return false;
  let files;
  try { files = await getPDFsFromFolder(_ppageFolder); } catch (e) { return false; }
  const matching = files.filter(f => rule.test(f.name));
  if (!matching.length) return false;
  for (const file of matching) {
    try {
      const fh = await _roOutputFolder.getFileHandle(file.name, { create: true });
      const writable = await fh.createWritable();
      await writable.write(await file.arrayBuffer());
      await writable.close();
    } catch (e) { return false; }
  }
  return true;
}

  } catch (err) {
    resultsDiv.innerHTML = `<div class="inv-results"><div style="color:#dc2626;font-size:9pt;">Could not parse estimate: ${esc(err.message)}</div></div>`;
    return;
  }

  const allItems = estimateData.line_items || [];
  const estimateParts = allItems
    .filter(it => !it.section_header && it.extended_price > 0)
    .map(it => ({ line: it.line, description: it.description || '', partType: it.part_type || '', price: it.extended_price }));
  console.log('[Estimate] Parts loaded for matching:', estimateParts.map(p => `L${p.line} ${p.description} $${p.price}`));

  if (!estimateParts.length) {
    const totalLines = allItems.filter(it => !it.section_header).length;
    resultsDiv.innerHTML = `<div class="inv-results"><div style="color:#d97706;font-size:9pt;">
      No parts with prices found in this estimate (${totalLines} line items parsed, none had extended prices).<br>
      Try ↡ Parse Full JSON to inspect the raw data.
    </div></div>`;
    return;
  }

  // Detect whether invoices are scanned (need OCR) or text-based
  setStatus('Checking invoice format…');
  const needsOCR = await _invoicesAreScanned(files[0]);

  let ocrWorker = null;
  if (needsOCR) {
    setStatus('Loading OCR engine (first run downloads ~10 MB, subsequent runs are instant)…');
    try {
      ocrWorker = await Tesseract.createWorker('eng');
    } catch (err) {
      resultsDiv.innerHTML = `<div class="inv-results"><div style="color:#dc2626;font-size:9pt;">OCR engine failed to load: ${esc(err.message)}</div></div>`;
      return;
    }
  }

  const invoiceLineData = [];
  for (let fi = 0; fi < files.length; fi++) {
    const file = files[fi];
    try {
      setStatus(`Reading invoice ${fi + 1} of ${files.length}: ${file.name}…`);
      const lines = await extractInvoiceRows(file, ocrWorker, (msg) => setStatus(msg));
      console.log(`[Invoice] ${file.name} — extracted ${lines.length} rows:`, lines);
      invoiceLineData.push({ lines, filename: file.name });
    } catch (_) { /* skip unreadable file */ }
  }

  if (ocrWorker) await ocrWorker.terminate();

  if (!invoiceLineData.length) {
    resultsDiv.innerHTML = `<div class="inv-results"><div style="color:#dc2626;font-size:9pt;">Could not read any invoice files.</div></div>`;
    return;
  }

  setStatus('Matching prices…');
  const pool    = buildInvoicePricePool(invoiceLineData);
  console.log('[Invoice] Price pool extracted from invoices:', pool);
  console.log('[Invoice] Estimate parts to match:', estimateParts);
  const results = matchInvoiceParts(estimateParts, pool);
  resultsDiv.innerHTML = renderInvoiceResults(results, files.length, estimateParts, pool);
}

// Returns true if the PDF appears to be a scanned image (no usable text layer).
async function _invoicesAreScanned(file) {
  try {
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    const page = await pdf.getPage(1);
    const content = await page.getTextContent();
    const text = content.items.map(i => i.str).join('').trim();
    return text.length < 50;
  } catch (_) { return true; }
}

// Extract rows from one invoice PDF.
// Uses Y-coordinate grouping for text-based PDFs; falls back to Tesseract OCR for scans.
async function extractInvoiceRows(file, ocrWorker, onProgress) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const rows = [];

  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);

    if (ocrWorker) {
      // ── OCR path ────────────────────────────────────────────────────────────
      if (onProgress) onProgress(`OCR: ${file.name} — page ${p} of ${pdf.numPages}…`);
      const viewport = page.getViewport({ scale: 2.5 }); // 2.5× for accuracy
      const canvas = document.createElement('canvas');
      canvas.width  = viewport.width;
      canvas.height = viewport.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
      const { data: { text } } = await ocrWorker.recognize(canvas);
      console.log(`[OCR] ${file.name} — page ${p} raw text:`, text);
      rows.push(...text.split(/\n/).map(l => l.trim()).filter(l => l.length > 0));
    } else {
      // ── Text-layer path ─────────────────────────────────────────────────────
      const content = await page.getTextContent();
      const byY = new Map();
      for (const item of content.items) {
        const s = item.str.trim();
        if (!s) continue;
        const y = Math.round(item.transform[5] / 3) * 3;
        if (!byY.has(y)) byY.set(y, []);
        byY.get(y).push({ x: item.transform[4], str: s });
      }
      for (const y of [...byY.keys()].sort((a, b) => b - a)) {
        rows.push(byY.get(y).sort((a, b) => a.x - b.x).map(i => i.str).join(' '));
      }
    }
  }

  return rows;
}

// Extracts the extended LIST price from each part row on each invoice.
// Rules:
//   - Part rows have at least 2 price columns (LIST … AMOUNT); single-price lines are totals/headers → skip.
//   - Lines containing total/summary keywords are skipped entirely.
//   - If the rightmost price (AMOUNT column) is $0.00 the part is on order / not yet received → skip.
//   - The SHIP quantity (first standalone integer before the price columns) is multiplied by the LIST
//     price to produce the extended list price, which is what the estimate's extended_price field uses.
function buildInvoicePricePool(invoiceLineData) {
  const pool = [];
  const PRICE_RE     = /(?<!\d)(\d+(?:,\d{3})*\.\d{2})(?!\d)/g;
  const FIRST_PRICE  = /(?<!\d)\d+(?:,\d{3})*\.\d{2}(?!\d)/;        // non-global for .search()
  const TOTAL_RE     = /\b(subtotal|freight|tax|total|sales\s*tax|pay\s*this|sublet)\b/i;

  for (const { lines, filename } of invoiceLineData) {
    for (const line of lines) {
      if (TOTAL_RE.test(line)) continue;

      // Collect all price-like values left-to-right
      const prices = [];
      let m;
      PRICE_RE.lastIndex = 0;
      while ((m = PRICE_RE.exec(line)) !== null) {
        prices.push(parseFloat(m[1].replace(/,/g, '')));
      }

      // Need at least LIST + AMOUNT; single-price lines are totals or headers
      if (prices.length < 2) continue;

      const listPrice     = prices[0];                   // leftmost  = LIST column
      const chargedAmount = prices[prices.length - 1];  // rightmost = AMOUNT column

      if (chargedAmount === 0) {
        console.log(`[Invoice] ZEROED OUT (on order, skipped): "${line.trim().slice(0, 100)}" — ${filename}`);
        continue;
      }

      // SHIP quantity: first standalone 1–2 digit integer that appears before the price columns.
      // Dealer invoices put the shipped qty as the leftmost column on each part row.
      const beforePrices = line.slice(0, line.search(FIRST_PRICE));
      const qtyMatch     = beforePrices.match(/\b(\d{1,2})\b/);
      const qty          = qtyMatch ? parseInt(qtyMatch[1], 10) : 1;

      // Extended list = qty × unit list — matches the estimate's extended_price field
      const extendedList = qty * listPrice;

      if (extendedList >= 1.00) {
        console.log(`[Invoice] LIST ${listPrice} × qty ${qty} = ${extendedList.toFixed(2)} (charged: ${chargedAmount}) — "${line.trim().slice(0, 80)}" — ${filename}`);
        pool.push({ amount: extendedList, context: line.slice(0, 120), source: filename });
      }
    }
  }
  return pool;
}

// Match estimate parts to invoice pool entries.
// Uses greedy exact-first matching so shared prices are allocated correctly.
function matchInvoiceParts(estimateParts, pool) {
  const used = new Set();

  function findMatch(price) {
    // Exact (within 1 cent)
    let i = pool.findIndex((e, idx) => !used.has(idx) && Math.abs(e.amount - price) < 0.02);
    if (i !== -1) return { idx: i, nearMatch: false };
    // Near (within 2% for amounts > $5)
    if (price > 5) {
      i = pool.findIndex((e, idx) => !used.has(idx) && Math.abs(e.amount - price) / price < 0.02);
      if (i !== -1) return { idx: i, nearMatch: true };
    }
    return null;
  }

  const matched = [], noInvoice = [], nearMatches = [];

  for (const part of estimateParts) {
    const hit = findMatch(part.price);
    if (hit) {
      used.add(hit.idx);
      const inv = pool[hit.idx];
      if (hit.nearMatch) nearMatches.push({ part, inv });
      else               matched.push({ part, inv });
    } else {
      noInvoice.push(part);
    }
  }

  // Remaining pool entries not matched to any estimate part (filter noise < $5)
  const notOnEstimate = pool.filter((_, i) => !used.has(i) && pool[i].amount >= 5.00);

  return { matched, nearMatches, noInvoice, notOnEstimate };
}

function renderInvoiceResults({ matched, nearMatches, noInvoice, notOnEstimate }, invoiceCount, estimateParts, pool) {
  const fmt = n => '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  const totalMatched = matched.length + nearMatches.length;
  const totalParts = estimateParts.length;

  let h = `<div class="inv-results">
    <div class="inv-results-title">Invoice Review</div>
    <div class="inv-results-sub">${invoiceCount} invoice${invoiceCount !== 1 ? 's' : ''} · ${totalParts} estimate part${totalParts !== 1 ? 's' : ''} · ${pool.length} invoice price${pool.length !== 1 ? 's' : ''} extracted</div>
    <div class="inv-counts">
      <div class="inv-count green"><span class="inv-num">${totalMatched}</span><span class="inv-lbl">Matched</span></div>
      <div class="inv-count ${noInvoice.length ? 'red' : 'green'}"><span class="inv-num">${noInvoice.length}</span><span class="inv-lbl">No Invoice</span></div>
      <div class="inv-count ${notOnEstimate.length ? 'amber' : 'green'}"><span class="inv-num">${notOnEstimate.length}</span><span class="inv-lbl">Not on Estimate</span></div>
      ${nearMatches.length ? `<div class="inv-count amber"><span class="inv-num">${nearMatches.length}</span><span class="inv-lbl">Price Diff</span></div>` : ''}
    </div>`;

  // ── Parts on estimate with no matching invoice ────────────────────────────
  if (noInvoice.length) {
    h += `<div class="inv-section red-border">
      <div class="inv-section-title">No Invoice Found (${noInvoice.length})</div>
      <div class="inv-section-sub">These parts appear on the estimate but no matching price was found in the uploaded invoices.</div>
      <table class="inv-table">
        <thead><tr><th>Line</th><th>Description</th><th>Type</th><th class="r">Est. Price</th></tr></thead>
        <tbody>`;
    for (const p of noInvoice) {
      h += `<tr>
        <td class="muted">${p.line ?? '—'}</td>
        <td>${esc(p.description)}</td>
        <td class="muted">${esc(p.partType)}</td>
        <td class="r">${fmt(p.price)}</td>
      </tr>`;
    }
    h += `</tbody></table></div>`;
  }

  // ── Price discrepancies ────────────────────────────────────────────────────
  if (nearMatches.length) {
    h += `<div class="inv-section amber-border">
      <div class="inv-section-title">Price Discrepancies (${nearMatches.length})</div>
      <div class="inv-section-sub">Estimate and invoice prices are close but not identical — verify these lines.</div>
      <table class="inv-table">
        <thead><tr><th>Line</th><th>Description</th><th class="r">Est. Price</th><th class="r">Inv. Price</th><th>Invoice</th></tr></thead>
        <tbody>`;
    for (const { part, inv } of nearMatches) {
      const diff = inv.amount - part.price;
      h += `<tr>
        <td class="muted">${part.line ?? '—'}</td>
        <td>${esc(part.description)}</td>
        <td class="r">${fmt(part.price)}</td>
        <td class="r" style="color:${diff > 0 ? '#16a34a' : '#dc2626'}">${fmt(inv.amount)}</td>
        <td class="src">${esc(inv.source)}</td>
      </tr>`;
    }
    h += `</tbody></table></div>`;
  }

  // ── Invoice amounts not found on estimate ─────────────────────────────────
  if (notOnEstimate.length) {
    // Group by invoice file
    const grouped = {};
    for (const inv of notOnEstimate) {
      if (!grouped[inv.source]) grouped[inv.source] = [];
      grouped[inv.source].push(inv);
    }
    h += `<div class="inv-section amber-border">
      <div class="inv-section-title">On Invoice — Not on Estimate (${notOnEstimate.length})</div>
      <div class="inv-section-sub">These prices appear in the invoices but have no matching line on the estimate. Review whether any should be added.</div>
      <table class="inv-table">
        <thead><tr><th>Price</th><th>Line from Invoice</th><th>Invoice File</th></tr></thead>
        <tbody>`;
    for (const [src, items] of Object.entries(grouped)) {
      for (const inv of items) {
        h += `<tr>
          <td class="r" style="width:80px">${fmt(inv.amount)}</td>
          <td class="muted">${esc(inv.context)}</td>
          <td class="src">${esc(src)}</td>
        </tr>`;
      }
    }
    h += `</tbody></table></div>`;
  }

  // ── Matched (collapsible) ─────────────────────────────────────────────────
  if (matched.length) {
    h += `<details class="inv-collapsible inv-section green-border">
      <summary><div class="inv-section-title">Matched (${matched.length})</div>
      <div class="inv-section-sub">Estimate prices confirmed in uploaded invoices.</div></summary>
      <table class="inv-table">
        <thead><tr><th>Line</th><th>Description</th><th>Type</th><th class="r">Price</th><th>Invoice</th></tr></thead>
        <tbody>`;
    for (const { part, inv } of matched) {
      h += `<tr>
        <td class="muted">${part.line ?? '—'}</td>
        <td>${esc(part.description)}</td>
        <td class="muted">${esc(part.partType)}</td>
        <td class="r">${fmt(part.price)}</td>
        <td class="src">${esc(inv.source)}</td>
      </tr>`;
    }
    h += `</tbody></table></details>`;
  }

  // ── Diagnostic (always shown, helps spot parsing problems) ────────────────
  h += `<details class="inv-collapsible inv-section" style="border-color:#e5e7eb;">
    <summary><div class="inv-section-title" style="font-size:11pt;color:#6b7280;">Diagnostic — parsed data</div></summary>
    <div class="inv-section-sub">Use this to verify the parser found the right prices. If estimate prices look wrong, try ↡ Parse Full JSON to inspect raw data.</div>
    <table class="inv-table">
      <thead><tr><th>Line</th><th>Estimate Part Description</th><th>Type</th><th class="r">Extended Price</th></tr></thead>
      <tbody>${estimateParts.map(p => `<tr>
        <td class="muted">${p.line ?? '—'}</td>
        <td>${esc(p.description)}</td>
        <td class="muted">${esc(p.partType)}</td>
        <td class="r">${fmt(p.price)}</td>
      </tr>`).join('')}</tbody>
    </table>
    <div style="margin-top:12px;font-size:8.5pt;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;">Invoice Prices Extracted (${pool.length})</div>
    <table class="inv-table" style="margin-top:6px;">
      <thead><tr><th class="r" style="width:70px">Amount</th><th>Row from Invoice</th><th>File</th></tr></thead>
      <tbody>${pool.map(e => `<tr>
        <td class="r">${fmt(e.amount)}</td>
        <td class="muted">${esc(e.context)}</td>
        <td class="src">${esc(e.source)}</td>
      </tr>`).join('')}</tbody>
    </table>
  </details>`;

  h += `</div>`;
  return h;
}

// ── De/Nib & Polish calculator ────────────────────────────────────────────────

// Builds a directional+section label: "RT Front Door", "LT Fender (Blend)", "Hood", etc.
function _panelLabel(desc, section, operation) {
  const isBlend = /^blend$/i.test(operation || '');
  const suffix  = isBlend ? ' (Blend)' : '';
  desc = desc || '';

  // Extract leading direction (RT / LT)
  const dirMatch = desc.match(/^(RT|LT)\b\s*/i);
  const dir  = dirMatch ? dirMatch[1].toUpperCase() : '';
  const body = dirMatch ? desc.slice(dirMatch[0].length).trim() : desc;

  // Clean section: "FRONT BUMPER & GRILLE" → "Front Bumper", "HOOD" → "Hood"
  const secClean = (section || '').replace(/\s*&\s*.+/, '').trim();
  const secTitle = secClean.split(' ')
    .map(w => w ? w[0].toUpperCase() + w.slice(1).toLowerCase() : '').join(' ');

  // If description already contains the section's panel keyword, use it as-is
  const bLow = body.toLowerCase(), sLow = secClean.toLowerCase();
  if (!secClean || bLow.includes(sLow) || sLow.includes(bLow)) {
    return desc + suffix;
  }

  // Generic remainder words that add no info beyond the section name
  const generic = /^(outer\s+panel|inner\s+panel|panel|door\s+asm|door\s+shell|door\s+skin|assembly)$/i.test(body);

  if (dir) {
    return (generic || !body)
      ? `${dir} ${secTitle}${suffix}`
      : `${dir} ${secTitle} ${body}${suffix}`;
  }
  return `${secTitle} — ${body || desc}${suffix}`;
}

async function triggerDenibCalc() {
  if (!window._lastFile) {
    alert('Please upload an estimate PDF first.');
    return;
  }
  const btn = document.getElementById('denibCalcBtn');
  const orig = btn?.textContent;
  if (btn) { btn.disabled = true; btn.textContent = 'Calculating…'; }
  try {
    const data = await parseEstimatePDF(window._lastFile);
    const ro      = data.document?.ro_number || '';
    const vehicle = data.document?.vehicle?.description || '';

    // Walk line items tracking the current section.
    // Skip: Miscellaneous Operations, bumpers, "Add for" additions, overlaps.
    let currentSection = '';
    const panels = [];
    for (const item of (data.line_items || [])) {
      if (item.section_header) { currentSection = item.description?.toUpperCase() || ''; continue; }
      if (/miscellaneous/i.test(currentSection))          continue;
      if (!item.paint || item.paint < 0.5)                 continue;
      if (/bumper/i.test(item.description || ''))         continue;
      if (/^add\s+for\b/i.test(item.description || ''))  continue;
      if (/^overlap\b/i.test(item.description || ''))     continue;
      if (/clear\s*coat/i.test(item.description || ''))  continue;
      if (/interior|jamb/i.test(item.description || '')) continue;
      if (!_isBuffablePanel(item.description) && !_isBuffablePanel(currentSection)) continue;

      const label   = _panelLabel(item.description, currentSection, item.operation);
      const buffHrs = Math.round(item.paint * 0.30 * 10) / 10;
      panels.push({ label, paintHrs: item.paint, buffHrs });
    }

    if (!panels.length) {
      alert('No buffable panels found (only fenders, doors, hoods, quarter panels, aperture panels, cabs, tailgates, box side outer panels, and side panels are included).');
      return;
    }

    const totalPaint = Math.round(panels.reduce((s, p) => s + p.paintHrs, 0) * 10) / 10;
    const totalBuff  = Math.round(panels.reduce((s, p) => s + p.buffHrs,  0) * 10) / 10;

    await _buildDenibPDF(panels, totalPaint, totalBuff, ro, vehicle);
  } catch(e) {
    alert('De/Nib calculation error: ' + e.message);
    console.error(e);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = orig; }
  }
}

async function _buildDenibPDF(panels, totalPaint, totalBuff, ro, vehicle) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ format: 'letter', unit: 'mm' });

  const PW = 215.9, LM = 19, RM = 196.9, CW = RM - LM, CX = PW / 2;
  let y = 18;

  // ── Title ──────────────────────────────────────────────────────────────────
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(18);
  doc.text('WET/DRY SAND, RUB-OUT & BUFF', LM, y);
  y += 13;

  // ── SPECIAL NOTATION ───────────────────────────────────────────────────────
  doc.setFontSize(10);
  doc.text('SPECIAL NOTATION:', CX, y, { align: 'center' });
  y += 7;

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  const body1 = "Refinished panels may or may not require a varying amount of wet sanding, compound rub-out, or buffing operations in order to match original finish texture. The clear coat contains ultraviolet screeners and reducing the clear coat thickness (mils) may result in early paint failure. Follow manufacturer’s recommendations when performing this type of repairs. Calculations should be based upon the outer surface only and should not include additions for clear coat, underside, inside or edges. Base refinish time does not include deduction for refinish overlap. In the event that this type of operation will be performed,";
  const b1 = doc.splitTextToSize(body1, CW - 16);
  doc.text(b1, CX, y, { align: 'center' });
  y += b1.length * 4.5 + 1;
  doc.setFont('helvetica', 'bold');
  doc.text('MOTOR suggests the following formula be considered:', CX, y, { align: 'center' });
  y += 7;

  // ── Formula bullet ─────────────────────────────────────────────────────────
  doc.setFont('helvetica', 'normal');
  doc.text('•', LM + 8, y);
  doc.text('Each panel requiring wet sand, rub-out and/or buff (refinish or blend):', LM + 13, y);
  y += 4.5;
  doc.text('Add 30% of full base refinish time', LM + 13, y);
  y += 9;

  // ── INCLUDED ───────────────────────────────────────────────────────────────
  doc.setFont('helvetica', 'bolditalic');
  doc.setFontSize(10);
  doc.text('INCLUDED:', LM, y);
  y += 5.5;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  for (const t of ['Compound, buff and/or polish as required', 'Panel outer surface only', 'Wet sand full panel as required']) {
    doc.text('•', LM + 8, y);
    doc.text(t, LM + 13, y);
    y += 5;
  }
  y += 3;

  // ── DOES NOT INCLUDE ───────────────────────────────────────────────────────
  doc.setFont('helvetica', 'bolditalic');
  doc.setFontSize(10);
  doc.text('DOES NOT INCLUDE:', LM, y);
  y += 5.5;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  for (const t of [
    'Acid rain damage',
    'Overspray removal',
    'Removal of residual material from recessed edges and jambs if required',
    'Wash, clean, wax, or detail entire vehicle prior to delivery if required',
  ]) {
    doc.text('•', LM + 8, y);
    const ls = doc.splitTextToSize(t, CW - 15);
    doc.text(ls, LM + 13, y);
    y += ls.length * 4.5 + 0.5;
  }
  y += 9;

  // ── Separator + calc header ────────────────────────────────────────────────
  doc.setDrawColor(0); doc.setLineWidth(0.4);
  doc.line(LM, y, RM, y);
  y += 7;

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(10);
  doc.text('DE/NIB & POLISH CALCULATION  —  RO# ' + ro, LM, y);
  y += 5.5;

  if (vehicle) {
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    const vl = doc.splitTextToSize(vehicle, CW);
    doc.text(vl, LM, y);
    y += vl.length * 3.8 + 3;
  }
  y += 2;

  // ── Table ──────────────────────────────────────────────────────────────────
  const C1 = LM, C2 = LM + 125, C3 = LM + 155, ROW = 6;

  // Header
  doc.setFillColor(26, 26, 46);
  doc.rect(LM, y, CW, ROW, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(9);
  doc.text('Panel / Operation', C1 + 2, y + 4);
  doc.text('Paint Hrs', C2 + 2, y + 4);
  doc.text('Buff Hrs (30%)', C3 + 2, y + 4);
  y += ROW;
  doc.setTextColor(0, 0, 0);

  // Data rows
  doc.setFont('helvetica', 'normal');
  panels.forEach((p, i) => {
    if (i % 2 === 1) { doc.setFillColor(245, 245, 245); doc.rect(LM, y, CW, ROW, 'F'); }
    doc.text(p.label,                C1 + 2, y + 4);
    doc.text(p.paintHrs.toFixed(1), C2 + 2, y + 4);
    doc.text(p.buffHrs.toFixed(1),  C3 + 2, y + 4);
    doc.setDrawColor(210, 210, 210); doc.setLineWidth(0.2);
    doc.line(LM, y + ROW, RM, y + ROW);
    y += ROW;
  });

  // Total
  doc.setDrawColor(0); doc.setLineWidth(0.8);
  doc.line(LM, y, RM, y);
  y += 1;
  doc.setFont('helvetica', 'bold');
  doc.text('TOTAL',                  C1 + 2, y + 4);
  doc.text(totalPaint.toFixed(1),   C2 + 2, y + 4);
  doc.text(totalBuff.toFixed(1),    C3 + 2, y + 4);
  y += ROW + 6;

  // Footnote
  doc.setFont('helvetica', 'italic');
  doc.setFontSize(7.5);
  doc.setTextColor(100, 100, 100);
  doc.text('* Bumper panels, miscellaneous operations, overlap adjustments, and additions excluded per CCC G52 formula.', LM, y);
  doc.setTextColor(0, 0, 0);

  // ── Footer ─────────────────────────────────────────────────────────────────
  const FY = 269;
  doc.setDrawColor(0); doc.setLineWidth(0.8);
  doc.line(LM, FY - 2, RM, FY - 2);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(11);
  doc.text('G52', LM, FY + 4);
  doc.setFont('helvetica', 'italic');
  doc.setFontSize(7.5);
  doc.text('Footnotes found in a chapter contain vehicle-specific information. The content of footnotes is in addition to,', CX, FY + 1, { align: 'center' });
  doc.text('and takes precedence over, information in the Guide to Estimating pages for the operation indicated.', CX, FY + 5, { align: 'center' });
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(9);
  doc.text('REV. 8-17', RM, FY + 5, { align: 'right' });

  const filename = `RO_${ro || 'estimate'}_DenibPolish.pdf`;

  if (_roOutputFolder) {
    try {
      const buf = doc.output('arraybuffer');
      const fh  = await _roOutputFolder.getFileHandle(filename, { create: true });
      const writable = await fh.createWritable();
      await writable.write(buf);
      await writable.close();
      return; // saved to folder — no browser download needed
    } catch (_) { /* fall through to download if write fails */ }
  }

  doc.save(filename);
}

async function processFile(file) {
  if (!file?.name?.toLowerCase().endsWith('.pdf')) {
    showStatus('Please upload a PDF file.', 'error'); return;
  }
  document.getElementById('uploadSection').style.display = 'none';
  document.getElementById('resultsSection').classList.add('hidden');
  showStatus('Reading PDF…');
  try {
    const rawText = await extractText(file);
    window._lastFile = file;
    showStatus('Analyzing estimate…');
    await new Promise(r => setTimeout(r, 80));
    _roOutputFolder = null;
    const html = render(rawText);
    document.getElementById('statusDiv').classList.add('hidden');
    const res = document.getElementById('resultsSection');
    res.innerHTML = html;
    res.classList.remove('hidden');
    updatePPageFolderLabel();
  } catch(e) {
    showStatus('Error reading PDF: ' + e.message, 'error');
    document.getElementById('uploadSection').style.display = '';
    console.error(e);
  }
}

// ── Events ────────────────────────────────────────────────────────────────────

const area  = document.getElementById('uploadArea');
const input = document.getElementById('fileInput');
area.addEventListener('click',     () => input.click());
area.addEventListener('dragover',  e  => { e.preventDefault(); area.classList.add('drag-over'); });
area.addEventListener('dragleave', () => area.classList.remove('drag-over'));
area.addEventListener('drop',      e  => {
  e.preventDefault(); area.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
});
input.addEventListener('change', e => { if (e.target.files[0]) processFile(e.target.files[0]); });

document.querySelectorAll('.checklist-item input[type="checkbox"]').forEach(cb => {
  cb.addEventListener('change', () => {
    cb.closest('.checklist-item').classList.toggle('checked-item', cb.checked);
  });
});
</script>
</body>
</html>
